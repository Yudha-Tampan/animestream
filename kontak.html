<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak Tim — MiruNime</title>
<meta name="description" content="Hubungi tim MiruNime — Owner, Developer, dan Editor siap membantu kalian.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
  /* ── KONTAK PAGE SPECIFIC ── */
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  body { font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif; }

  /* ── HERO ── */
  .kontak-hero {
    position: relative;
    padding: 72px 0 48px;
    text-align: center;
    overflow: hidden;
  }
  .kontak-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,61,110,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(124,92,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-wave {
    font-size: 52px;
    margin-bottom: 12px;
    display: block;
    animation: floatWave 3s ease-in-out infinite;
  }
  @keyframes floatWave {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-8px) rotate(3deg); }
  }
  .hero-title {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800;
    line-height: 1.15;
    margin: 0 0 10px;
    background: linear-gradient(135deg, #ff3d6e 0%, #a070ff 55%, #7c5cff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-tagline {
    color: var(--text-dim);
    font-size: 1rem;
    margin: 0 auto;
    max-width: 480px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 32px auto 0;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 0.82rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    transition: background .2s;
  }
  .stat-chip .stat-n {
    font-size: 1rem;
    font-weight: 800;
    color: var(--text);
  }
  .stat-chip.active { background: rgba(255,61,110,0.1); border-color: rgba(255,61,110,0.3); }

  /* ── CONTROLS ── */
  .kontak-controls {
    max-width: 800px;
    margin: 36px auto 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .kontak-search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .kontak-search-wrap .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--text-faint);
    pointer-events: none;
  }
  .kontak-search {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px 12px 40px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .kontak-search:focus {
    border-color: rgba(255,61,110,0.5);
    box-shadow: 0 0 0 3px rgba(255,61,110,0.1);
  }
  .kontak-search::placeholder { color: var(--text-faint); }

  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    color: var(--text-dim);
    font-size: 0.8rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,61,110,0.35);
  }

  /* ── GRID ── */
  .team-grid {
    max-width: 900px;
    margin: 36px auto 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .team-card {
    position: relative;
    background: rgba(22,24,33,0.75);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px 20px 22px;
    text-align: center;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    animation: cardIn .45s ease both;
    overflow: hidden;
  }
  .team-card::before {
    content: '';
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    opacity: 0.07;
    filter: blur(30px);
    pointer-events: none;
    transition: opacity .3s;
  }
  .team-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .team-card:hover::before { opacity: 0.14; }

  /* per-role glow */
  .team-card[data-role="Owner"]::before         { background: #ffd700; }
  .team-card[data-role="Partner Owner"]::before  { background: #4fa3e0; }
  .team-card[data-role="Tim Editor"]::before     { background: #ff6fad; }
  .team-card[data-role="Tim Developer"]::before  { background: #a070ff; }

  .team-card[data-role="Owner"]:hover        { border-color: rgba(255,215,0,0.3); }
  .team-card[data-role="Partner Owner"]:hover { border-color: rgba(79,163,224,0.3); }
  .team-card[data-role="Tim Editor"]:hover    { border-color: rgba(255,111,173,0.3); }
  .team-card[data-role="Tim Developer"]:hover { border-color: rgba(160,112,255,0.3); }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(24px) scale(0.97); }
    to   { opacity:1; transform:translateY(0)   scale(1); }
  }

  /* ── AVATAR ── */
  .card-avatar {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    overflow: hidden;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .team-card:hover .card-avatar {
    transform: scale(1.08);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .card-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* per-role avatar ring */
  .team-card[data-role="Owner"]        .card-avatar { border-color: rgba(255,215,0,0.5); box-shadow: 0 0 16px rgba(255,215,0,0.2); }
  .team-card[data-role="Partner Owner"] .card-avatar { border-color: rgba(79,163,224,0.5); box-shadow: 0 0 16px rgba(79,163,224,0.2); }
  .team-card[data-role="Tim Editor"]    .card-avatar { border-color: rgba(255,111,173,0.5); box-shadow: 0 0 16px rgba(255,111,173,0.2); }
  .team-card[data-role="Tim Developer"] .card-avatar { border-color: rgba(160,112,255,0.5); box-shadow: 0 0 16px rgba(160,112,255,0.2); }

  /* ── ROLE BADGE ── */
  .role-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .badge-owner         { background: linear-gradient(135deg, #b8860b, #ffd700); color: #1a1200; }
  .badge-partner-owner { background: linear-gradient(135deg, #1a6fa0, #4fa3e0); color: #fff; }
  .badge-tim-editor    { background: linear-gradient(135deg, #c2185b, #ff6fad); color: #fff; }
  .badge-tim-developer { background: linear-gradient(135deg, #5e35b1, #a070ff); color: #fff; }

  /* ── CARD TEXT ── */
  .card-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 3px;
    line-height: 1.2;
  }
  .card-handle {
    font-size: 0.8rem;
    color: var(--text-faint);
    margin: 0 0 18px;
    font-weight: 500;
  }

  /* ── WA BUTTON ── */
  .wa-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    padding: 10px 0;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #1ebe57, #25d366);
    color: #fff;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: filter .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 14px rgba(37,211,102,0.25);
  }
  .wa-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(37,211,102,0.4);
  }
  .wa-btn:active { transform: translateY(0); }
  .wa-btn svg { flex-shrink: 0; }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    animation: cardIn .4s ease;
  }
  .empty-icon { font-size: 52px; margin-bottom: 16px; display: block; }
  .empty-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin: 0 0 6px; }
  .empty-desc { font-size: 0.88rem; color: var(--text-faint); margin: 0; }

  /* ── ERROR STATE ── */
  .error-state {
    max-width: 420px;
    margin: 48px auto;
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.25);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    animation: cardIn .4s ease;
  }
  .error-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .error-title { font-size: 1rem; font-weight: 700; color: #ff4d4d; margin: 0 0 6px; }
  .error-desc { font-size: 0.84rem; color: var(--text-dim); margin: 0 0 18px; }
  .error-retry {
    background: #ff4d4d;
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 22px;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: filter .2s;
  }
  .error-retry:hover { filter: brightness(1.15); }

  /* ── SKELETON ── */
  .skeleton-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px 22px;
    text-align: center;
  }
  .skel {
    background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 999px;
    margin: 0 auto;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }
  .skel-circle  { width:76px; height:76px; border-radius:50%; margin-bottom:14px; }
  .skel-badge   { width:90px; height:20px; margin-bottom:8px; }
  .skel-name    { width:120px; height:18px; margin-bottom:6px; }
  .skel-handle  { width:80px; height:14px; margin-bottom:18px; }
  .skel-btn     { width:100%; height:38px; border-radius:12px; }

  /* ── SECTION WRAPPER ── */
  .kontak-section {
    padding: 0 20px 80px;
  }

  /* ── BACK LINK ── */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0;
    padding: 10px 0;
    transition: color .2s;
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }

  /* ── RESULT COUNT ── */
  .result-count {
    font-size: 0.8rem;
    color: var(--text-faint);
    text-align: center;
    margin-top: 20px;
    min-height: 1.2em;
  }

  @media (max-width: 600px) {
    .kontak-controls { flex-direction: column; }
    .filter-group    { justify-content: center; }
    .team-grid       { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .stats-bar       { gap: 10px; }
  }
  @media (max-width: 380px) {
    .team-grid { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .team-card, .hero-wave, .skel, .card-avatar { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="site-header" id="siteHeader">
  <div class="header-inner container">
    <a href="index.html" class="brand">
      <span class="brand-mark">🌊</span>
      <span class="brand-text">Miru<span class="accent">Nime</span></span>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="kontak.html" class="nav-link" style="color:var(--accent)">Kontak</a>
    </nav>
    <div class="header-actions">
      <button id="themeToggle" class="icon-btn" aria-label="Ganti tema">🌙</button>
      <button id="mobileMenuBtn" class="icon-btn hamburger" aria-label="Menu">☰</button>
    </div>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">🏠 Home</a>
    <a href="kontak.html" style="color:var(--accent)">📞 Kontak</a>
  </div>
</header>

<!-- ===================== KONTAK PAGE ===================== -->
<main>
  <!-- HERO -->
  <section class="kontak-hero container">
    <span class="hero-wave">🌊</span>
    <h1 class="hero-title" id="heroTitle">Tim MiruNime</h1>
    <p class="hero-tagline" id="heroTagline">Memuat data...</p>

    <!-- STATS -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-chip"><span class="stat-n" id="statTotal">—</span> Total Anggota</div>
      <div class="stat-chip active" id="statShown"><span class="stat-n" id="statShownN">—</span> Ditampilkan</div>
    </div>
  </section>

  <!-- CONTROLS -->
  <section class="kontak-section">
    <div class="container">
      <div class="kontak-controls" id="controls" style="display:none">
        <div class="kontak-search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="kontak-search" id="searchMember" placeholder="Cari nama atau username...">
        </div>
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn active" data-filter="all">Semua</button>
        </div>
      </div>

      <!-- TEAM GRID -->
      <div class="team-grid" id="teamGrid">
        <!-- skeleton placeholders -->
        ${[0,1,2,3].map(() => `
        <div class="skeleton-card">
          <div class="skel skel-circle"></div>
          <div class="skel skel-badge"></div>
          <div class="skel skel-name"></div>
          <div class="skel skel-handle"></div>
          <div class="skel skel-btn"></div>
        </div>`).join('')}
      </div>

      <p class="result-count" id="resultCount"></p>
    </div>
  </section>
</main>

<!-- ===================== FOOTER ===================== -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">🌊 Miru<span class="accent">Nime</span></div>
    <p class="footer-copy">© 2025 MiruNime — Data dikelola melalui <code>data/contact.json</code></p>
  </div>
</footer>

<script>
/* ============================================================
   KONTAK.HTML — Dynamic team page powered by data/contact.json
   ============================================================ */

const BADGE_CLASS = {
  'Owner':          'badge-owner',
  'Partner Owner':  'badge-partner-owner',
  'Tim Editor':     'badge-tim-editor',
  'Tim Developer':  'badge-tim-developer',
};

// Detect if value is an image path or emoji
function isImagePath(avatar) {
  return /\.(jpe?g|png|webp|gif|svg|avif)$/i.test(avatar);
}

function buildAvatarHTML(avatar) {
  if (isImagePath(avatar)) {
    return `<img src="${avatar}" alt="Avatar" onerror="this.parentElement.textContent='👤'">`;
  }
  return `<span>${avatar}</span>`;
}

function buildBadgeClass(role) {
  return BADGE_CLASS[role] || 'badge-tim-developer';
}

function buildCard(member, delay) {
  const badgeCls = buildBadgeClass(member.role);
  const avatarHTML = buildAvatarHTML(member.avatar);
  const waHref = `https://wa.me/${member.wa}`;
  return `
    <div class="team-card" data-role="${member.role}" data-name="${member.name.toLowerCase()}" data-handle="${member.handle.toLowerCase()}" style="animation-delay:${delay}ms">
      <div class="card-avatar">${avatarHTML}</div>
      <span class="role-badge ${badgeCls}">${member.role}</span>
      <p class="card-name">${member.name}</p>
      <p class="card-handle">${member.handle}</p>
      <a class="wa-btn" href="${waHref}" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.116.554 4.103 1.523 5.828L.057 23.786a.5.5 0 0 0 .616.637l6.197-1.625A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.79 9.79 0 0 1-5.027-1.383l-.36-.214-3.728.978.996-3.641-.235-.374A9.794 9.794 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
        Chat WhatsApp
      </a>
    </div>`;
}

function buildError(msg) {
  return `
    <div class="error-state" style="grid-column:1/-1">
      <span class="error-icon">😵</span>
      <p class="error-title">Gagal memuat data tim</p>
      <p class="error-desc">${msg}</p>
      <button class="error-retry" onclick="init()">Coba Lagi</button>
    </div>`;
}

function buildEmpty(query) {
  return `
    <div class="empty-state">
      <span class="empty-icon">🔍</span>
      <p class="empty-title">Tidak ditemukan</p>
      <p class="empty-desc">Tidak ada anggota yang cocok dengan "<strong>${query}</strong>"</p>
    </div>`;
}

/* ── State ── */
let allMembers = [];
let activeFilter = 'all';
let searchQuery  = '';

function getFiltered() {
  return allMembers.filter(m => {
    const matchFilter = activeFilter === 'all' || m.role === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q
      || m.name.toLowerCase().includes(q)
      || m.handle.toLowerCase().includes(q)
      || m.role.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

function renderGrid() {
  const grid    = document.getElementById('teamGrid');
  const filtered = getFiltered();
  const count   = document.getElementById('resultCount');
  const shownN  = document.getElementById('statShownN');

  if (!filtered.length) {
    grid.innerHTML = buildEmpty(searchQuery || activeFilter);
  } else {
    grid.innerHTML = filtered.map((m, i) => buildCard(m, i * 60)).join('');
  }

  shownN.textContent = filtered.length;
  count.textContent  = filtered.length
    ? `Menampilkan ${filtered.length} dari ${allMembers.length} anggota`
    : '';
}

function buildFilters(roles) {
  const group = document.getElementById('filterGroup');
  // keep "Semua" button
  const all = group.querySelector('[data-filter="all"]');
  group.innerHTML = '';
  group.appendChild(all);

  roles.forEach(role => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = role;
    btn.textContent = role;
    btn.addEventListener('click', () => {
      activeFilter = role;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
    group.appendChild(btn);
  });

  all.addEventListener('click', () => {
    activeFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    all.classList.add('active');
    renderGrid();
  });
}

async function init() {
  const grid = document.getElementById('teamGrid');
  // show skeleton
  grid.innerHTML = [0,1,2,3].map(() => `
    <div class="skeleton-card">
      <div class="skel skel-circle"></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-name"></div>
      <div class="skel skel-handle"></div>
      <div class="skel skel-btn"></div>
    </div>`).join('');

  try {
    const res = await fetch('data/contact.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    const data = await res.json();

    // populate hero
    document.getElementById('heroTitle').textContent   = `Tim ${data.site}`;
    document.getElementById('heroTagline').textContent = data.tagline;
    document.title = `Kontak Tim — ${data.site}`;

    allMembers = data.team || [];
    document.getElementById('statTotal').textContent  = allMembers.length;
    document.getElementById('statShownN').textContent = allMembers.length;

    // build filters from unique roles
    const roles = [...new Set(allMembers.map(m => m.role))];
    buildFilters(roles);

    // show controls
    document.getElementById('controls').style.display = '';

    renderGrid();
  } catch (err) {
    grid.innerHTML = buildError(err.message);
    document.getElementById('controls').style.display = 'none';
  }
}

// search listener
document.getElementById('searchMember').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

/* ── Theme toggle (mirrors index.html behaviour) ── */
(function () {
  const toggle = document.getElementById('themeToggle');
  const saved  = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    toggle.textContent = '🌞';
  }
  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', isLight ? '' : 'light');
    toggle.textContent = isLight ? '🌙' : '🌞';
    localStorage.setItem('theme', isLight ? 'dark' : 'light');
  });
})();

/* ── Mobile menu ── */
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
  document.getElementById('mobileNav').classList.toggle('open');
});

// kick off
init();
</script>
</body>
</html>
